name: Flask Docker CI

on:
  push:
    branches:
      - main
      
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Build Docker Image
          run: docker build -t flask-app .
        - name: Run Container
          run: docker run -d --name flask-test flask-app
        - name: Check Running Containers
          run: docker ps
